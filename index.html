<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding-top: 50px; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); max-width: 600px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="mb-4">Expense Tracker</h2>
        <div class="input-group mb-3">
            <input id="title" class="form-control" placeholder="Title">
            <input id="amount" class="form-control" placeholder="Amount" type="number">
            <input id="category" class="form-control" placeholder="Category">
            <button class="btn btn-primary" onclick="addExpense()">Add</button>
        </div>
        <h4 id="totalAmount">Total: $0</h4>
        <ul id="list" class="list-group"></ul>
    </div>

    <script>
        async function fetchExpenses() {
            // Changed from http://localhost:3000/list to /list
            const res = await fetch('/list'); 
            const data = await res.json();
            const total = data.reduce((sum, ex) => sum + parseFloat(ex.amount), 0);
            document.getElementById('totalAmount').innerText = `Total: $${total.toFixed(2)}`;
            document.getElementById('list').innerHTML = data.map(ex => 
                `<li class="list-group-item d-flex justify-content-between">
                    <span>${ex.title} - <strong>$${ex.amount}</strong> (${ex.category})</span>
                    <button class="btn btn-danger btn-sm" onclick="deleteExpense(${ex.id})">Delete</button>
                </li>`
            ).join('');
        }

        async function addExpense() {
            const data = { 
                title: document.getElementById('title').value, 
                amount: document.getElementById('amount').value, 
                category: document.getElementById('category').value 
            };
            // Changed from http://localhost:3000/add to /add
            await fetch('/add', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify(data) 
            });
            fetchExpenses();
        }

        async function deleteExpense(id) {
            // Changed from http://localhost:3000/delete to /delete
            await fetch(`/delete/${id}`, { method: 'DELETE' });
            fetchExpenses();
        }

        fetchExpenses();
    </script>
</body>
</html>
